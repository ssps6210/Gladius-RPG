                            return(
                              <div key={item.uid} className="ii" style={{borderColor:rar.color+"55",background:`linear-gradient(160deg,${rar.color}08,#120e06)`}}>
                                <div style={{fontSize:20}}>📜</div>
                                <div className="rb" style={{color:rar.color,borderColor:rar.color+"55",background:`${rar.color}15`}}>{lang==="zh"?rar.label:(rar.labelEn||rar.label)}</div>
                                <div className="iin" style={{color:rar.color}}>{lang==="zh"?item.name:(item.nameEn||item.name)}</div>
                                <div className="iis">{L("攻","ATK")}{item.attack} {L("防","DEF")}{item.defense} HP{item.hp}</div>
                                <div style={{color:"#f0c040",fontSize:12,margin:"6px 0"}}>{L("售價","Price")} 🪙{price}</div>
                                <button className="btn btd" style={{width:"100%",fontSize:10}} onClick={()=>sellItem(item.uid)}>{L("出售","Sell")}</button>
                              </div>
                            );
                          }
                          return(
                            <div key={item.uid} className="ii" style={{borderColor:rar.color+"55",background:`linear-gradient(160deg,${rar.color}08,#120e06)`}}>
                              <div className="iii">{item.icon}</div>
                              {rar.id!=="normal"&&<div className="rb" style={{color:rar.color,borderColor:rar.color+"55",background:`${rar.color}15`}}>{lang==="zh"?rar.label:(rar.labelEn||rar.label)}</div>}
                              <div className="iin" style={{color:rar.color}}>{lang==="zh"?item.name:(item.nameEn||item.name)}</div>
                              <div className="iis">
                                {item.attack>0&&<div>{L("攻","A")}+{item.attack}</div>}
                                {item.defense>0&&<div>{L("防","D")}+{item.defense}</div>}
                                {item.hp>0&&<div>HP+{item.hp}</div>}
                              </div>
                              <AffixLines affixes={item.affixes} lang={lang}/>
                              <div style={{color:"#f0c040",fontSize:12,margin:"6px 0"}}>{L("售價","Price")} 🪙{price}</div>
                              <div style={{display:"flex",gap:4}}>
                                <button className="btn btp" style={{flex:1,fontSize:9,padding:"5px"}} onClick={()=>equipItem(item)}>{lang==="zh"?"裝備":"Equip"}</button>
                                <button className="btn btd" style={{flex:1,fontSize:9,padding:"5px"}} onClick={()=>sellItem(item.uid)}>{L("出售","Sell")}</button>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* ── INVENTORY ── */}
              {tab==="inventory"&&(
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,flexWrap:"wrap"}}>
                    <div className="stl" style={{margin:0,border:"none",padding:0,flex:1}}>{t("invTitle")} <span style={{color:"#6a5030",fontSize:13}}>— {inventory.length} {L("件","items")}</span></div>
                    <button className="btn btm" style={{fontSize:10,padding:"5px 10px"}} onClick={sortInventory}>{t("invSort")}</button>
                    <select value={sellThreshold} onChange={e=>setSellThreshold(e.target.value)}
                      style={{background:"#1a1208",
                        border:`1px solid ${sellThreshold==="mythic"?"#c84040":sellThreshold==="legendary"?"#9c50d4":"#4a3010"}`,
                        color:sellThreshold==="mythic"?"#c84040":sellThreshold==="legendary"?"#9c50d4":sellThreshold==="rare"?"#4a9fd4":sellThreshold==="magic"?"#4caf50":"#8a7050",
                        borderRadius:3,padding:"4px 6px",fontSize:10,fontFamily:"'Cinzel',serif",cursor:"pointer"}}>
                      <option value="normal">⬜ {L("普通","Common")}</option>
                      <option value="magic">🟢 {L("魔法","Magic")}</option>
                      <option value="rare">🔵 {L("稀有","Rare")}</option>
                      <option value="legendary">🟣 {L("傳說","Legendary")}</option>
                      <option value="mythic">🟠 {L("全部","All")}</option>
                    </select>
                    <button className="btn btd" style={{fontSize:10,padding:"5px 10px"}}
                      onClick={()=>{
                        if((sellThreshold==="mythic"||sellThreshold==="legendary")&&
                          !window.confirm(L(`確定賣出所有【${sellThreshold==="mythic"?"神話":"傳說"}】以下裝備？`,`Sell all ${sellThreshold==="mythic"?"Mythic":"Legendary"} and below?`))) return;
                        sellJunk(sellThreshold);
                      }}>🗑 {L("賣出","Sell")}</button>
                  </div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:12}}>
                    {SLOT_FILTERS.map(f=>(
                      <div key={f.id} className={`wcat-btn${invFilter===f.id?" active":""}`} onClick={()=>setInvFilter(f.id)}>{f.label}</div>
                    ))}
                  </div>
                  {filteredInv.length===0&&<div style={{color:"#4a3a20",fontStyle:"italic"}}>{t("emptySlot")}</div>}
                  <div className="ig">
                    {filteredInv.map(item=>{
                      if(item.type==="potion") return(
                        <div key={item.uid} className="ii">
                          <div className="iii">{item.icon}</div>
                          <div className="iin">{item.name}</div>
                          <div className="iis" style={{color:"#50a860"}}>
                            {item.pct>0?`+${item.pct}% HP`:`+${item.heal} HP`}
                          </div>
                          <div style={{color:"#f0c040",fontSize:11,marginBottom:4}}>{L("售","Sell")} 🪙{calcSellPrice(item)}</div>
                          <div style={{display:"flex",gap:4}}>
                            <button className="btn btm" style={{flex:1,fontSize:9,padding:"5px"}} onClick={()=>{
                              setPlayer(p=>{
                                const healAmt = item.pct>0 ? Math.floor(cMhp(p)*item.pct/100) : (item.heal||0);
                                return {...p, hp:Math.min(p.hp+healAmt, cMhp(p))};
                              });
                              setInventory(inv=>inv.filter(i=>i.uid!==item.uid));
                            }}>{L("使用","Use")}</button>
                            <button className="btn btd" style={{flex:1,fontSize:9,padding:"5px"}} onClick={()=>sellItem(item.uid)}>{L("賣出","Sell")}</button>
                          </div>
                        </div>
                      );
                      if(item.type==="merc_scroll") {
                        const gr=getRarity(item.rarity);
                        return(
                          <div key={item.uid} className="ii" style={{borderColor:gr.color+"66",background:`linear-gradient(160deg,${gr.color}10,#120e06)`,boxShadow:gr.glow||"none"}}>
                            <div style={{fontSize:22,filter:`drop-shadow(0 2px 6px ${gr.color}88)`}}>📜</div>
                            <div className="rb" style={{color:gr.color,borderColor:gr.color+"55",background:`${gr.color}15`}}>{gr.label}</div>
                            <div className="iin" style={{color:gr.color,textShadow:gr.glow?`0 0 8px ${gr.color}`:"none"}}>{item.name}</div>
                            <div style={{fontSize:20,margin:"4px 0"}}>{item.icon}</div>
                            <div className="iis">
                              <div style={{color:"#c8781e"}}>{L("攻擊","ATK")} {item.attack}</div>
                              <div style={{color:"#4a9fd4"}}>{L("防禦","DEF")} {item.defense}</div>
                              <div style={{color:"#c84040"}}>HP {item.hp}</div>
                              {item.heal>0&&<div style={{color:"#50c890"}}>{L("回復","Regen")} {item.heal}/rd</div>}
                            </div>
                            {item.affixes && item.affixes.length > 0 && <div className="iaf">
                              {item.affixes.map((a,i)=>(
                                <div key={i} className={`al${a.special?" as":""}`}>
                                  {a.stat?`${a.tag}:+${a.rolledVal}`:a.special==="all"?`${a.tag}:全屬+${Math.round(a.rolledVal*100)}%`:a.special==="first"?`${a.tag}:先攻×${1+a.rolledVal}`:""}
                                </div>
                              ))}
                            </div>}
                            <div style={{fontSize:10,color:"#5a4828",fontStyle:"italic",margin:"4px 0"}}>{item.desc}</div>
                            <div style={{color:"#f0c040",fontSize:11,marginBottom:4}}>{L("售","Sell")} 🪙{calcSellPrice(item)}</div>
                            <div style={{display:"flex",flexDirection:"column",gap:4}}>
                              <button className="btn btp" style={{width:"100%",fontSize:10}} onClick={()=>{
                                setSelectedScrolls(p=>p.includes(item.uid)?p.filter(x=>x!==item.uid):p.length>=4?p:[...p,item.uid]);
                                setTab("dungeon");
                              }}>
                                {selectedScrolls.includes(item.uid)?t("scrollSelected"):t("addToParty")}
                              </button>
                              <button className="btn btd" style={{width:"100%",fontSize:10}} onClick={()=>sellItem(item.uid)}>{L("出售","Sell")}</button>
                            </div>
                          </div>
                        );
                      }
                      // Regular equipment
                      const rar=getRarity(item.rarity);
                      const price=calcSellPrice(item);
                      return(
                        <div key={item.uid} className="ii" style={{borderColor:rar.color+(rar.id==="normal"?"33":"77"),background:rar.id==="normal"?"linear-gradient(160deg,#1a1208,#120e06)":`linear-gradient(160deg,${rar.color}0a,#120e06)`,boxShadow:rar.glow||"none"}}>
                          <div className="iii" style={{filter:`drop-shadow(0 2px 4px ${rar.color}66)`}}>{item.icon}</div>
                          {rar.id!=="normal"&&<div className="rb" style={{color:rar.color,borderColor:rar.color+"55",background:`${rar.color}15`}}>{lang==="zh"?rar.label:(rar.labelEn||rar.label)}</div>}
                          <div className="iin" style={{color:rar.color}}>{lang==="zh"?item.name:(item.nameEn||item.name)}</div>
                          {item.itemLevel>0&&<div style={{fontSize:9,color:"#5a4020",marginBottom:2}}>Lv.{item.itemLevel}</div>}
                          <div className="iis">
                            {item.attack>0&&<div style={{color:item.attack>50?"#f5c040":item.attack>25?"#c8781e":"#5a4020"}}>{L("攻","A")}+{item.attack}</div>}
                            {item.defense>0&&<div style={{color:item.defense>40?"#80c0f0":item.defense>20?"#4a9fd4":"#5a4020"}}>{L("防","D")}+{item.defense}</div>}
                            {item.hp>0&&<div style={{color:item.hp>80?"#f06060":item.hp>40?"#c84040":"#5a4020"}}>HP+{item.hp}</div>}
                            {item.speed>0&&<div style={{color:"#5a9050"}}>{L("速","S")}+{item.speed}</div>}
                          </div>
                          {item.cat&&<div style={{fontSize:10,color:"#d08030",marginBottom:3}}>{item.cat&&WEAPON_CATEGORIES[item.cat]?WEAPON_CATEGORIES[item.cat].icon:""}{item.cat&&WEAPON_CATEGORIES[item.cat]?(lang==="zh"?WEAPON_CATEGORIES[item.cat].label:(WEAPON_CATEGORIES[item.cat].labelEn||WEAPON_CATEGORIES[item.cat].label)):""} · {item.cat&&WEAPON_CATEGORIES[item.cat]?(lang==="zh"?WEAPON_CATEGORIES[item.cat].traitDesc:(WEAPON_CATEGORIES[item.cat].traitDescEn||WEAPON_CATEGORIES[item.cat].traitDesc)):""}</div>}
                          <AffixLines affixes={item.affixes} lang={lang}/>
                          <div style={{color:"#f0c040",fontSize:11,margin:"5px 0"}}>{L("售","Sell")} 🪙{price}</div>
                          <div style={{display:"flex",gap:4}}>
                            <button className="btn btp" style={{flex:1,fontSize:9,padding:"5px"}} onClick={()=>equipItem(item)}>{lang==="zh"?"裝備":"Equip"}</button>
                            <button className="btn btd" style={{flex:1,fontSize:9,padding:"5px"}} onClick={()=>sellItem(item.uid)}>{L("出售","Sell")}</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

            </div>
          </main>
        </div>

        {/* Quest completion notification */}
        {questNotify&&(
          <div className="quest-notify">
            {questNotify.split("\n").map((line,i)=>(
              <div key={i} style={{marginBottom:i===0?4:0}}>{line}</div>
            ))}
          </div>
        )}

        {/* ── 新手攻略彈窗 ── */}
        {showGuide&&(
          <div className="lp" style={{zIndex:600}} onClick={()=>setShowGuide(false)}>
            <div onClick={e=>e.stopPropagation()} style={{
              background:"linear-gradient(160deg,#1e1508,#14100a,#1e1508)",
              border:"2px solid #8b5a14",borderRadius:4,
              padding:"22px 26px",maxWidth:480,width:"90vw",maxHeight:"80vh",
              overflowY:"auto",position:"relative",
              boxShadow:"0 12px 60px rgba(0,0,0,.92)",
            }}>
              {/* Close */}
              <button onClick={()=>setShowGuide(false)} style={{
                position:"absolute",top:12,right:12,
                width:24,height:24,borderRadius:"50%",
                background:"#2a1208",border:"1px solid #5a3010",
                color:"#c8961e",fontSize:14,cursor:"pointer",lineHeight:"22px",
              }}>×</button>

              {/* Title */}
              <div style={{fontFamily:"'Cinzel Decorative',serif",fontSize:15,
                color:"#c8961e",textAlign:"center",marginBottom:16,letterSpacing:2}}>
                ⚔ {t("guideTitle")} ⚔
              </div>

              {[
                { icon:"🗺", titleKey:"g1title", linesKey:"g1" },
                { icon:"⚔", titleKey:"g2title", linesKey:"g2" },
                { icon:"🎨", titleKey:"g3title", linesKey:"g3" },
                { icon:"⚒", titleKey:"g4title", linesKey:"g4" },
                { icon:"🍺", titleKey:"g5title", linesKey:"g5" },
                { icon:"🏟", titleKey:"g6title", linesKey:"g6" },
                { icon:"📈", titleKey:"g7title", linesKey:"g7" },
              ].map(section=>(
                <div key={section.titleKey} style={{marginBottom:14}}>
                  <div style={{
                    fontFamily:"'Cinzel',serif",fontSize:12,color:"#c8961e",
                    marginBottom:6,display:"flex",alignItems:"center",gap:6,
                    borderBottom:"1px solid #3a2a10",paddingBottom:4,
                  }}>
                    <span>{section.icon}</span>{t(section.titleKey)}
                  </div>
                  {t(section.linesKey).map((line,i)=>(
                    <div key={i} style={{
                      fontSize:11,color:"#c8a860",lineHeight:1.8,
                      paddingLeft:8,
                      borderLeft:"2px solid #4a3010",
                      marginBottom:3,
                    }}>• {line}</div>
                  ))}
                </div>
              ))}

              <div style={{textAlign:"center",marginTop:8,fontSize:10,
                color:"#5a4020",fontStyle:"italic",fontFamily:"'Crimson Text',serif"}}>
                {t("guideClose")}
              </div>
            </div>
          </div>
        )}

        {/* 羊皮紙故事結局彈窗 */}
        {storyPopup&&(
          <div className="lp" style={{zIndex:500}}>
            <div className="parchment-popup" style={{
              minWidth:300,maxWidth:460,
              padding:"32px 32px 28px",
              textAlign:"center",
            }}>
              {/* Wax seal */}
              <div style={{display:"flex",justifyContent:"center",marginBottom:16}}>
                <div className="wax-seal">⚔️</div>
              </div>
              {/* Decorative rule */}
              <div style={{
                fontFamily:"'Cinzel',serif",fontSize:9,color:"#7a5020",
                letterSpacing:5,marginBottom:14,
              }}>── QUEST COMPLETE ──</div>
              {/* Title */}
              <div style={{
                fontFamily:"'Cinzel',serif",fontSize:17,color:"#3a1e08",
                marginBottom:18,letterSpacing:1.5,fontWeight:"bold",
                borderBottom:"1px solid #8b6a2a",paddingBottom:12,
              }}>
                {storyPopup.icon} {storyPopup.title}
              </div>
              {/* Conclusion text */}
              <div style={{
                fontSize:13,color:"#2a1208",lineHeight:2.1,
                fontFamily:"'Crimson Text',serif",fontStyle:"italic",
                textAlign:"justify",marginBottom:20,
                padding:"0 6px",
                borderLeft:"2px solid #c8a85088",
                borderRight:"2px solid #c8a85088",
              }}>
                {storyPopup.conclusion}
              </div>
              {/* Reward badge */}
              <div style={{
                fontSize:12,color:"#5a3010",
                background:"rgba(139,90,20,.1)",
                border:"1px dashed #8b6a2a",
                borderRadius:2,padding:"9px 14px",
                marginBottom:18,fontFamily:"'Cinzel',serif",letterSpacing:.5,
              }}>
                🪙 {storyPopup.reward.gold} {L("金幣","Gold")} · ✨ {storyPopup.reward.exp} EXP
              </div>
              {/* Bottom rule */}
              <div style={{
                fontSize:9,color:"#8a6a30",letterSpacing:4,
                fontFamily:"'Cinzel',serif",marginBottom:16,
              }}>── 賞金已入帳，任務終結 ──</div>
              <button
                onClick={()=>setStoryPopup(null)}
                style={{
                  width:"100%",padding:"11px",
                  background:"linear-gradient(135deg,#3a2010,#2a1408)",
                  color:"#e6d5a8",border:"1px solid #6a4a1a",
                  borderRadius:2,cursor:"pointer",
                  fontFamily:"'Cinzel',serif",fontSize:12,letterSpacing:1,
                  boxShadow:"0 2px 8px rgba(0,0,0,.4)",
                }}>
                {L("收下賞金，離開酒館","Claim Reward & Leave")}
              </button>
            </div>
          </div>
        )}

        {/* Loot Popup */}
        {lootDrop&&<LootPopup
          item={lootDrop}
          lang={lang}
          t={t}
          onEquip={equipLootNow}
          onTake={takeLoot}
          onDiscard={discardLoot}
        />}
      </div>
    </>
  );
}
try {
  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  document.getElementById('loading').style.display='none';
} catch(e) {
  document.getElementById('loading').innerHTML=
    '<div style="color:#c84040;font-size:13px;text-align:center;padding:20px;max-width:400px">'+
    '⚠️ Load Failed<br><br><small style="color:#8a5030;word-break:break-all">'+e.message+'</small><br><br>'+
    '<button onclick="location.reload()" style="padding:8px 20px;background:#1a1208;color:#c8961e;'+
    'border:1px solid #8b5a14;cursor:pointer;font-family:serif;font-size:14px">🔄 Reload</button></div>';
  console.error(e);
}
  </script>
</body>
</html>
