    }
    const won=np.hp>0;
    if(!won){np.gold=Math.max(50,np.gold-Math.min(300,Math.floor(np.gold*0.1)));np.hp=1;}
    const totalMonsters=dungeon.waves.flatMap(w=>w.monsters).length+1;
    log.push({txt:`─────────────────`,type:"sep"});
    log.push({txt:L(`📊 戰鬥結算`,`📊 Battle Summary`),type:"title"});
    log.push({txt:L(`${won?"🏆 副本完成！":"💀 副本失敗"} · 擊殺${totalKills}/${totalMonsters}`,`${won?"🏆 Dungeon Clear!":"💀 Dungeon Failed"} · Kills ${totalKills}/${totalMonsters}`),type:won?"win":"lose"});
    log.push({txt:L(`⚔ 造成${totalDmgDealt} · 承受${totalDmgTaken} · 爆擊${totalCrits}次 · 掉落${drops.length}件`,`⚔ Out ${totalDmgDealt} · In ${totalDmgTaken} · Crits ${totalCrits} · Drops ${drops.length}`),type:"info"});
    return{log,finalPlayer:np,drops,won};
  }

  function simulateMercRun(dungeonId, initPlayer, mercs){
    const dungeon=MERC_DUNGEONS.find(d=>d.id===dungeonId)||MERC_DUNGEONS[0];
    let np={...initPlayer};
    const pAtk=cAtk(np),pDef=cDef(np),pMhp=cMhp(np);
    const specials=gSpec(np);
    const wCat=getWeaponCat(np);

    // Scale merc stats by player level — mercs should feel impactful
    const lvScale = 1 + (np.level - 1) * 0.18; // was 0.12
    const nm = mercs.map(m=>({
      ...m,
      // Higher base minimums so mercs always contribute
      scaledHp:  Math.floor(Math.max(m.hp,  120) * lvScale),
      scaledAtk: Math.floor(Math.max(m.attack, 10) * lvScale * 1.2), // 20% attack bonus
      scaledDef: Math.floor(Math.max(m.defense, 5) * lvScale * 0.8),
      scaledHeal: m.heal ? Math.floor(m.heal * lvScale * 0.6) : 0,
      curHp: Math.floor(Math.max(m.hp, 120) * lvScale),
      alive: true,
    }));

    const log=[],drops=[];
    let totalDmgDealt=0,totalDmgTaken=0;

    log.push({txt:L(`🏴 傭兵副本：${dungeon.icon}${dungeon.label}`,`🏴 Merc Dungeon: ${dungeon.icon}${dungeon.labelEn||dungeon.label}`),type:"title"});
    log.push({txt:`"${dungeon.lore}"`,type:"info"});
    log.push({txt:L(`📢 傭兵隊（${nm.length}名）：${nm.map(m=>m.name).join("、")}`,`📢 Party (${nm.length}): ${nm.map(m=>m.name).join(", ")}`),type:"info"});
    log.push({txt:L(`⚔ 你的戰力：攻${pAtk} 防${pDef} HP${pMhp}`,`⚔ Your Stats: ATK${pAtk} DEF${pDef} HP${pMhp}`),type:"info"});
    nm.forEach(m=>log.push({txt:L(`  ${m.icon}${m.name}：攻${m.scaledAtk} 防${m.scaledDef} HP${m.scaledHp}`,`  ${m.icon}${m.name}: ATK${m.scaledAtk} DEF${m.scaledDef} HP${m.scaledHp}`),type:"info"}));
    log.push({txt:`━━━━━━━━━━━━━━━━━━`,type:"sep"});

    for(let wi=0;wi<dungeon.waves.length;wi++){
      const wave=dungeon.waves[wi];
      if(np.hp<=0&&nm.every(m=>!m.alive)) break;
      log.push({txt:L(`━━ 第${wi+1}波 — ${wave.desc} ━━`,`━━ Wave ${wi+1}: ${wave.desc} ━━`),type:"sep"});

      for(const mKey of wave.enemies){
        if(np.hp<=0&&nm.every(m=>!m.alive)) break;

        // Build enemy with higher difficulty for merc dungeons
        const mData=MONSTERS[mKey];
        const fallbackKey=Object.keys(MONSTERS)[Math.floor(Math.random()*6)];
        const enemy=buildEnemy(
          mData?mKey:fallbackKey,
          np.level + dungeon.lvBonus,
          (wave.mult||1.0) * 1.3  // +30% harder than regular dungeons
        );
        if(!mData) enemy.name=mKey;
        log.push({txt:L(`${enemy.icon}${enemy.name} 出現！HP:${enemy.maxHp} 攻:${enemy.attack} 防:${enemy.defense}`,`${enemy.icon}${lang==="zh"?enemy.name:(enemy.nameEn||enemy.name)} Appears! HP:${enemy.maxHp} ATK:${enemy.attack} DEF:${enemy.defense}`),type:"info"});

        let round=0;
        while((np.hp>0||nm.some(m=>m.alive)) && enemy.hp>0 && round<80){
          round++;

          // ── Player attacks ──
          if(np.hp>0){
            let dmg=Math.max(1,pAtk-enemy.defense+Math.floor(Math.random()*5)-2);
            const{healed,extra,isCrit}=applySpec(specials,dmg,enemy);
            dmg+=extra;
            if(isCrit) log.push({txt:L("💥 爆擊！","💥 Critical Hit!"),type:"hit"});
            if(enemy.trait==="dodge"&&Math.random()<0.18){
              log.push({txt:L(`${enemy.name}閃避！`,`${lang==="zh"?enemy.name:(enemy.nameEn||enemy.name)} Dodges!`),type:"enemy"});
            } else {
              const blocked=enemy.trait==="armor"?Math.floor(dmg*0.4):enemy.trait==="dragonArmor"?Math.floor(dmg*0.35):0;
              dmg=Math.max(1,dmg-blocked);
              enemy.hp=Math.max(0,enemy.hp-dmg);
              totalDmgDealt+=dmg;
              log.push({txt:L(`回合${round}: 你→${enemy.icon}${enemy.name} ${dmg}`,`Round ${round}: You→${enemy.icon}${lang==="zh"?enemy.name:(enemy.nameEn||enemy.name)} ${dmg}`),type:"hit"});
            }
            if(healed>0){np.hp=Math.min(np.hp+healed,pMhp);log.push({txt:L(`🩸 吸血+${healed}`,`🩸 Lifesteal +${healed}`),type:"heal"});}
          }

          // ── Mercs attack ──
          for(const m of nm){
            if(!m.alive||enemy.hp<=0) continue;
            // Merc damage: use scaledAtk, bypass most of enemy defense (mercs target weak spots)
            // Min damage = 15% of merc's scaled attack to prevent 1-damage scenarios
            const rawMercDmg = m.scaledAtk - Math.floor(enemy.defense * 0.4) + Math.floor(Math.random()*6);
            const md = Math.max(Math.floor(m.scaledAtk * 0.15), rawMercDmg);
            enemy.hp=Math.max(0,enemy.hp-md);
            totalDmgDealt+=md;
            if(md>0) log.push({txt:L(`${m.icon}${m.name}→${enemy.name} ${md}`,`${m.icon}${m.name}→${lang==="zh"?enemy.name:(enemy.nameEn||enemy.name)} ${md}`),type:"merc"});
          }
          if(enemy.hp<=0) break;

          // ── Enemy attacks — prioritise alive mercs as tanks ──
          const aliveMercs=nm.filter(m=>m.alive);
          const tanks=aliveMercs.filter(m=>m.scaledDef>=10);
          const frontline=tanks.length?tanks:aliveMercs;

          if(frontline.length>0){
            // Enemy damage is split between tank and splash to player
            // Higher def mercs absorb more — prevents instant wipe
            const t=frontline[Math.floor(Math.random()*frontline.length)];
            // Enemy damage reduced by merc def (mercs are now sturdier)
            const mercDmgReduction = Math.min(0.6, t.scaledDef / (enemy.attack + 1));
            const ed=Math.max(Math.floor(enemy.attack*0.2),
              Math.floor(enemy.attack*(1-mercDmgReduction) + Math.floor(Math.random()*4)));
            t.curHp=Math.max(0,t.curHp-ed);
            totalDmgTaken+=ed;
            log.push({txt:L(`${enemy.name}→${t.icon}${t.name} ${ed}傷害 (HP:${t.curHp}/${t.scaledHp})`,`${lang==="zh"?enemy.name:(enemy.nameEn||enemy.name)}→${t.icon}${t.name} ${ed} dmg (HP:${t.curHp}/${t.scaledHp})`),type:"enemy"});
            if(t.curHp<=0){
              t.alive=false;
              log.push({txt:L(`💀 ${t.name} 陣亡！`,`💀 ${t.name} Fallen!`),type:"lose"});
            }
          }

          // If all mercs dead, enemy attacks player directly
          if(nm.every(m=>!m.alive)&&np.hp>0){
            const ed=Math.max(1,enemy.attack-pDef+Math.floor(Math.random()*4)-2);
            np.hp=Math.max(0,np.hp-ed);
            totalDmgTaken+=ed;
            log.push({txt:L(`⚠️ 傭兵全滅！${enemy.name}→你 ${ed}傷害`,`⚠️ All Mercs Down! ${lang==="zh"?enemy.name:(enemy.nameEn||enemy.name)}→You ${ed} dmg`),type:"enemy"});
          }

          // Enemy also does splash damage to player even with mercs (20% bleedthrough)
          if(frontline.length>0&&np.hp>0){
            const splash=Math.max(0,Math.floor((enemy.attack-pDef)*0.2));
            if(splash>0){
              np.hp=Math.max(0,np.hp-splash);
              totalDmgTaken+=splash;
            }
          }

          // ── Healer tick ──
          const healerMerc=nm.find(m=>m.alive&&m.scaledHeal>0);
          if(healerMerc){
            const ha=healerMerc.scaledHeal;
            np.hp=Math.min(np.hp+ha,pMhp);
            // Also heal wounded mercs a bit
            nm.filter(m=>m.alive&&m.curHp<m.scaledHp).forEach(m=>{
              m.curHp=Math.min(m.scaledHp,m.curHp+Math.floor(ha*0.5));
            });
            log.push({txt:L(`💚 ${healerMerc.name} 回復 ${ha}HP（含傭兵）`,`💚 ${healerMerc.name} Heals ${ha}HP (party)`),type:"heal"});
          }

          // Fire DoT
          if(enemy.trait==="fire"){
            enemy.burnStacks=(enemy.burnStacks||0)+1;
            const bd=enemy.burnStacks*2;
            np.hp=Math.max(0,np.hp-bd);
            log.push({txt:L(`🔥 燒傷${bd}`,`🔥 Burn ${bd}`),type:"enemy"});
          }
        }// end while

        if(enemy.hp<=0){
          const expG=Math.floor(enemy.expReward*((dungeon.reward&&dungeon.reward.expMult)||1.5));
          const goldG=Math.floor(enemy.goldReward*((dungeon.reward&&dungeon.reward.goldMult)||2.0));
          np=lvUp(np,expG,goldG,log);
          log.push({txt:L(`✅ 擊敗${enemy.name}！+${expG}EXP +${goldG}金`,`✅ Defeated ${lang==="zh"?enemy.name:(enemy.nameEn||enemy.name)}! +${expG}EXP +${goldG}G`),type:"win"});
          // Loot chance per kill (higher than regular dungeons)
          if(Math.random()<0.30+(dungeon.reward&&dungeon.reward.scrollBonus||0)*0.5){
            const d=genLoot(np.level,(dungeon.reward&&dungeon.reward.scrollBonus)||0.2);
            drops.push(d);
            log.push({txt:L(`✨ 掉落：${d.rarityLabel}【${d.name}】`,`✨ Drop: ${d.rarityLabelEn||d.rarityLabel} [${d.nameEn||d.name}]`),type:"loot"});
          }
        } else {
          log.push({txt:L(`💀 戰鬥失敗！`,`💀 Battle Failed!`),type:"lose"});
          break;
        }
      }// end for enemies

      // Rest between waves, also revive wounded mercs partially
      if(np.hp>0){
        np.hp=Math.min(pMhp,np.hp+Math.floor(pMhp*0.20));
        nm.filter(m=>m.alive).forEach(m=>{
          m.curHp=Math.min(m.scaledHp,m.curHp+Math.floor(m.scaledHp*0.30));
        });
        const aliveCount=nm.filter(m=>m.alive).length;
        log.push({txt:L(`🏕 波次結束，休息回復（傭兵存活 ${aliveCount}/${nm.length}）`,`🏕 Wave End — Rest (Mercs alive: ${aliveCount}/${nm.length})`),type:"info"});
      }
    }// end waves

    // ── Boss fight ──
    if(np.hp>0&&dungeon.boss){
      const bd=dungeon.boss;
      const bossMult=(dungeon.reward&&dungeon.reward.goldMult)||1;
      const bossEnemy={
        name:bd.name, nameEn:bd.nameEn||bd.name, icon:bd.icon, trait:bd.trait, traitDesc:bd.traitDesc||"", traitDescEn:bd.traitDescEn||bd.traitDesc||"",
        hp:  Math.floor((np.level*10+20)*bd.hpM*2.0*bossMult),
        maxHp:Math.floor((np.level*10+20)*bd.hpM*2.0*bossMult),
        attack: Math.floor((np.level*3.0+5)*bd.atkM*1.4),
        defense:Math.floor((np.level*1.5+3)*bd.defM*1.2),
        expReward:Math.floor(np.level*60*((dungeon.reward&&dungeon.reward.expMult)||1.5)),
        goldReward:Math.floor(np.level*30*((dungeon.reward&&dungeon.reward.goldMult)||2.0)),
        shielded:false,burnStacks:0,regenVal:0,isBoss:true,
      };
      log.push({txt:`━━━━━━━━━━━━━━━━━━`,type:"sep"});
      log.push({txt:L(`👑 副本首領：${bd.icon}${bd.name} 登場！`,`👑 Dungeon Boss: ${bd.icon}${bd.nameEn||bd.name} Enters!`),type:"title"});
      log.push({txt:L(`HP:${bossEnemy.maxHp} 攻:${bossEnemy.attack} 防:${bossEnemy.defense} | ${bd.traitDesc||""}`,`HP:${bossEnemy.maxHp} ATK:${bossEnemy.attack} DEF:${bossEnemy.defense} | ${bd.traitDescEn||bd.traitDesc||""}`),type:"info"});
      const bleedRef={val:0};
      const r=fightMonster(bossEnemy,np,pAtk,pDef,pMhp,specials,wCat,log,bleedRef);
      np=r.np; totalDmgDealt+=r.totalDmgDealt;
      if(r.won){
        np=lvUp(np,bossEnemy.expReward,bossEnemy.goldReward,log);
        log.push({txt:L(`👑 擊敗首領${bd.name}！+${bossEnemy.expReward}EXP +${bossEnemy.goldReward}金`,`👑 Boss Defeated: ${bd.nameEn||bd.name}! +${bossEnemy.expReward}EXP +${bossEnemy.goldReward}G`),type:"win"});
        // Boss guaranteed drops — much better than before
        const scrollBonus=(dungeon.reward&&dungeon.reward.scrollBonus)||0.3;
        if(Math.random()<scrollBonus+0.2){
          const s=genMercScroll(np.level);drops.push(s);
          log.push({txt:L(`📜 首領掉落捲軸：${s.rarityLabel}【${s.name}】`,`📜 Boss Scroll: ${s.rarityLabelEn||s.rarityLabel} [${s.name}]`),type:"loot"});
        }
        // Always drop at least one item from boss
        const d=genLoot(np.level,(dungeon.reward&&dungeon.reward.scrollBonus)||0.25);
        drops.push(d);
        log.push({txt:L(`✨ Boss掉落：${d.rarityLabel}【${d.name}】`,`✨ Boss Drop: ${d.rarityLabelEn||d.rarityLabel} [${d.nameEn||d.name}]`),type:"loot"});
        // Chance of second drop
        if(Math.random()<0.45){
          const d2=genLoot(np.level,((dungeon.reward&&dungeon.reward.scrollBonus)||0.25)+0.1);
          drops.push(d2);
          log.push({txt:L(`✨ 額外掉落：${d2.rarityLabel}【${d2.name}】`,`✨ Bonus Drop: ${d2.rarityLabelEn||d2.rarityLabel} [${d2.nameEn||d2.name}]`),type:"loot"});
        }
      } else {
        log.push({txt:L(`💀 敗於首領${bd.name}！`,`💀 Defeated by Boss ${bd.nameEn||bd.name}!`),type:"lose"});
      }
    }

    const won=np.hp>0;
    if(!won){np.gold=Math.max(50,np.gold-Math.min(300,Math.floor(np.gold*0.08)));np.hp=1;}
    const aliveCount=nm.filter(m=>m.alive).length;
    log.push({txt:`─────────────────`,type:"sep"});
    log.push({txt:L(`📊 ${won?t("victory"):t("defeat")} · 傭兵存活${aliveCount}/${nm.length} · 造成${totalDmgDealt} · 承受${totalDmgTaken} · 掉落${drops.length}件`,`📊 ${won?t("victory"):t("defeat")} · Mercs ${aliveCount}/${nm.length} · Out ${totalDmgDealt} · In ${totalDmgTaken} · Drops ${drops.length}`),type:won?"win":"lose"});
    return{log,finalPlayer:np,drops,won};
  }

  // ── Simulate Arena PvP ────────────────────────────────────────────────────
  function simulateArenaBattle(pl, opponent) {
    const pAtk = cAtk(pl);
    const pDef = cDef(pl);
    const pMhp = cMhp(pl);
    const specials = gSpec(pl);
    const wc = getWeaponCat(pl);
    const oWc = WEAPON_CATEGORIES[opponent.wcKey];
    const pSpd = cSpd(pl);
    const oSpd = Math.floor((5 + opponent.level*0.7) * (opponent.tier==="strong"?1.3:opponent.tier==="normal"?1.0:0.8));
    const log = [];
    const bleedRef = {val:0};

    log.push({txt:L(`⚔️ 競技場對決！`,`⚔️ Arena Battle!`),type:"title"});
    log.push({txt:L(`你 (Lv.${pl.level} 攻${pAtk} 防${pDef}) vs ${opponent.name} (Lv.${opponent.level} 攻${opponent.attack} 防${opponent.defense})`,`You (Lv.${pl.level} ATK${pAtk} DEF${pDef}) vs ${opponent.nameEn||opponent.name} (Lv.${opponent.level} ATK${opponent.attack} DEF${opponent.defense})`),type:"info"});
    if(wc)  log.push({txt:L(`你的武器：${wc.label} — ${wc.traitDesc}`,`Your Weapon: ${wc.labelEn||wc.label} — ${wc.traitDescEn||wc.traitDesc}`),type:"info"});
    if(oWc) log.push({txt:L(`對手武器：${oWc.label} — ${oWc.traitDesc}`,`Opponent Weapon: ${oWc.labelEn||oWc.label} — ${oWc.traitDescEn||oWc.traitDesc}`),type:"info"});
    log.push({txt:`━━━━━━━━━━━━━━━━━━`,type:"sep"});
    if(pSpd>=oSpd||(wc&&wc.trait==="firstblood"))
      log.push({txt:L(`⚡ 你先手！（速度 ${pSpd} vs ${oSpd}）`,`⚡ You go first! (Speed ${pSpd} vs ${oSpd})`),type:"hit"});
    else
      log.push({txt:L(`⚡ 對手先手！（速度 ${oSpd} vs ${pSpd}）`,`⚡ Opponent first! (Speed ${oSpd} vs ${pSpd})`),type:"enemy"});

    const fakeEnemy = {
      name:opponent.name, nameEn:opponent.nameEn||opponent.name, icon:"🏟",
      hp:opponent.maxHp, maxHp:opponent.maxHp,
      attack:opponent.attack, defense:opponent.defense,
      trait:oWc?oWc.trait:"balanced", traitDesc:oWc?oWc.traitDesc:"",
      isBoss:false, burnStacks:0, shielded:false, regenVal:0,
      expReward:0, goldReward:0,
    };

    const result = fightMonster(fakeEnemy, {...pl}, pAtk, pDef, pMhp, specials, wc, log, bleedRef);
    // Win condition: enemy dead, OR round limit reached but player has more HP%
    const enemyHpPct = fakeEnemy.hp / fakeEnemy.maxHp;
    const playerHpPct = result.np.hp / pMhp;
    const won = fakeEnemy.hp <= 0 || (result.np.hp > 0 && playerHpPct > enemyHpPct);
    if(!result.won && won) {
      log.push({txt:L(`⏱ 時間到！HP比較：你 ${Math.round(playerHpPct*100)}% vs 對手 ${Math.round(enemyHpPct*100)}% — 你勝出！`,
                      `⏱ Time! HP: You ${Math.round(playerHpPct*100)}% vs Opp ${Math.round(enemyHpPct*100)}% — You win!`),type:"win"});
    }
    let goldPlundered = 0;

    if(won) {
      goldPlundered = Math.floor(opponent.goldCarried * (0.10 + Math.random()*0.15));
      log.push({txt:`━━━━━━━━━━━━━━━━━━`,type:"sep"});
      log.push({txt:L(`🏆 勝利！擊敗 ${opponent.name}！`,`🏆 Victory! Defeated ${opponent.nameEn||opponent.name}!`),type:"win"});
      log.push({txt:L(`💰 掠奪金幣 ${goldPlundered}（對手攜帶 ${opponent.goldCarried}）`,`💰 Plundered ${goldPlundered}G (opponent carried ${opponent.goldCarried}G)`),type:"win"});
    } else {
      log.push({txt:`━━━━━━━━━━━━━━━━━━`,type:"sep"});
      log.push({txt:L(`💀 落敗！被 ${opponent.name} 擊倒！`,`💀 Defeated! Knocked down by ${opponent.nameEn||opponent.name}!`),type:"lose"});
      log.push({txt:L(`🛌 你需要休息 30 分鐘才能再戰`,`🛌 Need 30 min rest before next arena fight`),type:"lose"});
    }
    log.push({txt:`─────────────────`,type:"sep"});
    log.push({txt:L(`📊 造成 ${result.totalDmgDealt} · 承受 ${result.totalDmgTaken} · 爆擊 ${result.crits} 次`,`📊 DMG Out ${result.totalDmgDealt} · DMG In ${result.totalDmgTaken} · Crits ${result.crits}`),type:"info"});
    return {log, finalPlayer:result.np, won, goldPlundered};
  }

  const startBattle=(dungeon,tier)=>{
    if(Date.now() < dungeonInjuredUntil) {
      const mins = Math.ceil((dungeonInjuredUntil-Date.now())/60000);
      alert(L(`你仍在養傷中，還需 ${mins} 分鐘才能出戰！\n前往酒館住宿可立即恢復。`,`Still recovering — ${mins} min remaining.\nRest at the Tavern Inn to recover now.`));
      return;
    }
    const result=simulateRun(dungeon,tier,{...player});
    const fp = result.finalPlayer;
    const killCount = dungeon.waves.flatMap(w=>w.monsters).length + (dungeon.boss?1:0);
    const bossKill  = result.won ? 1 : 0;
    fp.totalKills     = (fp.totalKills||0) + (result.won ? killCount : Math.floor(killCount*0.5));
    fp.totalBossKills = (fp.totalBossKills||0) + bossKill;
    fp.totalDungeons  = (fp.totalDungeons||0) + (result.won ? 1 : 0);
    fp.totalGoldEarned= (fp.totalGoldEarned||0) + Math.max(0, fp.gold - player.gold);
    fp.highestLevel   = Math.max(fp.highestLevel||1, fp.level);
    if(!result.won) {
      fp.hp = 1;
      setDungeonInjuredUntil(Date.now() + 30*60*1000);
    }
    // Track per-monster kills from dungeon waves for tavern quests
    if(result.won) {
      const mk = {...(fp.monsterKills||{})};
      dungeon.waves.forEach(w=>w.monsters.forEach(mKey=>{
        mk[mKey]=(mk[mKey]||0)+1;
      }));
      // Also track boss kill by its monster key
      if(dungeon.boss) mk[dungeon.boss]=(mk[dungeon.boss]||0)+1;
      fp.monsterKills = mk;
    }
    setPlayer(fp);
    setReplay({lines:result.log, cursor:0, drops:result.drops, dungeon, tier, won:result.won, pending:false, isExpedition:false});
    setTab("battle");
    updateQuestProgress(fp, inventory);
  };

  const startExpedition=(expedition)=>{
    if(Date.now() < dungeonInjuredUntil) {
      const mins = Math.ceil((dungeonInjuredUntil-Date.now())/60000);
      alert(L(`你仍在養傷中，還需 ${mins} 分鐘才能出戰！\n前往酒館住宿可立即恢復。`,`Still recovering — ${mins} min remaining.\nRest at the Tavern Inn to recover now.`));
      return;
    }
    const result=simulateExpedition(expedition,{...player});
    const fp = result.finalPlayer;
    fp.totalKills       = (fp.totalKills||0) + (result.won ? 1 : 0);
    fp.totalExpeditions = (fp.totalExpeditions||0) + (result.won ? 1 : 0);
    fp.totalGoldEarned  = (fp.totalGoldEarned||0) + Math.max(0, fp.gold - player.gold);
    fp.highestLevel     = Math.max(fp.highestLevel||1, fp.level);
    if(!result.won) {
      fp.hp = 1;
      setDungeonInjuredUntil(Date.now() + 30*60*1000);
    }
    if(result.won && expedition.monster) {
      const mk = {...(fp.monsterKills||{})};
      mk[expedition.monster] = (mk[expedition.monster]||0) + 1;
      fp.monsterKills = mk;
    }
    setPlayer(fp);
    setReplay({lines:result.log, cursor:0, drops:result.drops, won:result.won, expedition, isExpedition:true});
    setTab("battle");
    updateQuestProgress(fp, inventory);
  };

  useEffect(()=>{
    if(!replay||replay.cursor>=replay.lines.length) return;
    const delay = (replay.lines[replay.cursor]&&replay.lines[replay.cursor].type==="sep")?60:
                  (replay.lines[replay.cursor]&&replay.lines[replay.cursor].type==="title")?100:30;
    replayTimerRef.current=setTimeout(()=>{
      setReplay(r=>r?{...r,cursor:r.cursor+1}:null);
    },delay);
    return()=>clearTimeout(replayTimerRef.current);
  },[replay]);

  useEffect(()=>{
    if(!replay||replay.cursor<replay.lines.length) return;
    if(replay.drops&&replay.drops.length>0&&!lootDrop){
      setLootDrop({...replay.drops[0], _remaining: replay.drops.slice(1)});
    }
  },[(replay&&replay.cursor)]);

  const takeLoot=()=>{
    const remaining=(lootDrop&&lootDrop._remaining)||[];
    setInventory(inv=>[...inv,{...lootDrop,_remaining:undefined}]);
    setLootDrop(remaining.length>0?{...remaining[0],_remaining:remaining.slice(1)}:null);
  };
  const discardLoot=()=>{
    const remaining=(lootDrop&&lootDrop._remaining)||[];
    setLootDrop(remaining.length>0?{...remaining[0],_remaining:remaining.slice(1)}:null);
  };
  const equipLootNow=()=>{
    const item={...lootDrop,_remaining:undefined};
    const remaining=(lootDrop&&lootDrop._remaining)||[];
    const old=player.equipment[item.slot];
    setPlayer(p=>({...p,equipment:{...p.equipment,[item.slot]:item}}));
    if(old)setInventory(inv=>[...inv,{...old,uid:Date.now()}]);
    setLootDrop(remaining.length>0?{...remaining[0],_remaining:remaining.slice(1)}:null);
  };

  const mercScrollsInInv = inventory.filter(i=>i.type==="merc_scroll");
  const selectedScrollObjs = selectedScrolls.map(uid=>inventory.find(i=>i.uid===uid)).filter(Boolean);

  const startMercBattle=(dungeonId)=>{
    const dungeon=MERC_DUNGEONS.find(d=>d.id===dungeonId)||MERC_DUNGEONS[0];
    if(player.level<dungeon.minLv){alert(L(`需要 Lv.${dungeon.minLv}！`,`Requires Lv.${dungeon.minLv}!`));return;}
    if(!selectedScrolls.length){alert(L("請先從背包選擇傭兵契約捲軸！","Select Merc Scrolls from your inventory first!"));return;}
    const usedUids=new Set(selectedScrolls);
    setInventory(inv=>inv.filter(i=>!usedUids.has(i.uid)));
    const mercs=selectedScrollObjs.map(s=>({...s,curHp:s.hp,alive:true}));
    const np={...player};
    const result=simulateMercRun(dungeonId,np,mercs);
    const fp=result.finalPlayer;
    fp.totalMercRuns=(fp.totalMercRuns||0)+(result.won?1:0);
    fp.highestLevel=Math.max(fp.highestLevel||1,fp.level);
    setPlayer(fp);
    setSelectedScrolls([]);
    setReplay({lines:result.log,cursor:0,drops:result.drops,won:result.won,isMerc:true,mercDungeonId:dungeonId});
    setTab("battle");
    updateQuestProgress(fp,inventory);
  };

  const usePotion=()=>{
    const idx=inventory.findIndex(i=>i.type==="potion"); if(idx===-1)return;
    const p=inventory[idx]; const ni=[...inventory]; ni.splice(idx,1);
    setPlayer(pl=>{
      const healAmt = p.pct>0 ? Math.floor(cMhp(pl)*p.pct/100) : (p.heal||0);
      return {...pl, hp:Math.min(pl.hp+healAmt, cMhp(pl))};
    });
    setInventory(ni);
  };

  const buyItem=item=>{
    if(player.gold<item.cost)return;
    setPlayer(p=>({...p,gold:p.gold-item.cost}));
    const {cost:_c,auctionId:_a,currentBid:_b,myBid:_m,bidCount:_bc,endsIn:_e,sold:_s,...clean}=item;
    setInventory(inv=>[...inv,{...clean,uid:Date.now()+Math.random(),specials:clean.specials||[],affixes:clean.affixes||[]}]);
  };
  const sellItem=uid=>{
    const item=inventory.find(i=>i.uid===uid); if(!item)return;
    const price=calcSellPrice(item);
    setPlayer(p=>({...p,gold:p.gold+price}));
    setInventory(inv=>inv.filter(i=>i.uid!==uid));
  };
  const sortInventory=()=>{
    const order=["weapon","offhand","armor","helmet","gloves","boots","ring","amulet","merc_scroll","potion"];
    const rarOrder=["mythic","legendary","rare","magic","normal"];
    setInventory(inv=>[...inv].sort((a,b)=>{
      const si=order.indexOf(a.type||a.slot)-order.indexOf(b.type||b.slot);
      if(si!==0)return si;
      return rarOrder.indexOf(a.rarity)-rarOrder.indexOf(b.rarity);
    }));
  };
  const sellJunk=(threshold)=>{
    const rarOrder=["normal","magic","rare","legendary","mythic"];
    const threshIdx=rarOrder.indexOf(threshold||"normal");
    const equippedUids=new Set(Object.values(player.equipment).filter(Boolean).map(e=>e.uid));
    const junk=inventory.filter(i=>{
      if(!i.uid) return false; // skip items without uid
      if(i.type==="potion"||i.type==="merc_scroll") return false;
      if(equippedUids.has(i.uid)) return false;
      return rarOrder.indexOf(i.rarity||"normal")<=threshIdx;
    });
    if(!junk.length){alert(L(`沒有${getRarity(threshold||"normal").label}以下的裝備可賣`,`No gear at or below ${getRarity(threshold||"normal").label} to sell`));return;}
    const total=junk.reduce((s,i)=>s+calcSellPrice(i),0);
    const junkUids=new Set(junk.map(i=>i.uid)); // use Set for O(1) lookup
    setPlayer(p=>({...p,gold:p.gold+total}));
    setInventory(inv=>inv.filter(i=>!junkUids.has(i.uid)));
    alert(L(`賣出 ${junk.length} 件裝備，獲得 ${total} 金幣`,`Sold ${junk.length} items for ${total} gold`));
  };
  const refreshShop=()=>{
    const cost=Math.floor(player.level*5+20);
    if(player.gold<cost){alert(L(`刷新需要 ${cost} 金幣`,`Refresh costs ${cost} gold`));return;}
    setPlayer(p=>({...p,gold:p.gold-cost}));
    setShopItems(Array.from({length:8},()=>genShopItem(player.level)));
  };
  const doEnhance = (uid) => {
    // Search inventory AND equipment slots
    let item = inventory.find(i=>i.uid===uid);
    let equippedSlot = null;
    if(!item) {
      for(const [slot, eq] of Object.entries(player.equipment)) {
        if(eq && eq.uid === uid) { item = eq; equippedSlot = slot; break; }
      }
    }
    if(!item) return;
    const curLv = item.enhLv || 0;
    if(curLv >= 10) { setEnhanceLog(l=>[L("⚠️ 已達最高強化等級 +10","⚠️ Max enhancement +10 reached"),...l]); return; }
    const lvData = ENHANCE_LEVELS[curLv];
    const cost = enhanceCost(item);
    if(player.gold < cost) { setEnhanceLog(l=>[L(`💰 金幣不足（需要 ${cost}）`,`💰 Not enough gold (need ${cost})`),...l]); return; }

    setPlayer(p=>({...p, gold: p.gold - cost}));

    const success = Math.random() < lvData.rate;
    if(success) {
      const newLv = curLv + 1;
      const baseAttack  = item.baseAttack  || (item.attack||0);
      const baseDefense = item.baseDefense || (item.defense||0);
      const baseHp      = item.baseHp      || (item.hp||0);
      const baseSpeed   = item.baseSpeed   || (item.speed||0);
      const enhanced = {
        ...item, enhLv: newLv,
        baseAttack, baseDefense, baseHp, baseSpeed,
        ...applyEnhanceBonus({...item,enhLv:newLv,baseAttack,baseDefense,baseHp,baseSpeed})
      };
      setInventory(inv=>inv.map(i=>i.uid===uid?enhanced:i));
      Object.entries(player.equipment).forEach(([slot,eq])=>{
        if((eq&&eq.uid)===uid) setPlayer(p=>({...p,equipment:{...p.equipment,[slot]:enhanced}}));
      });
      setEnhanceAnim("success");
      setEnhanceLog(l=>[L(`✨ 強化成功！${item.name} → +${newLv}！費用 ${cost} 金幣`,`✨ Enhanced! ${item.name} → +${newLv}! Cost ${cost}g`),...l]);
      setPlayer(p=>{
        const np2={...p,totalEnhances:(p.totalEnhances||0)+1};
        updateQuestProgress(np2,inventory);
        return np2;
      });
    } else {
      const newLv = curLv <= 3 ? curLv : curLv - 1;
      const degraded = newLv === curLv
        ? item 
        : applyEnhanceBonus({...item, enhLv:newLv,
            baseAttack:(item.baseAttack||(item.attack||0)),
            baseDefense:(item.baseDefense||(item.defense||0)),
            baseHp:(item.baseHp||(item.hp||0)),
            baseSpeed:(item.baseSpeed||(item.speed||0)),
          });
      if(newLv !== curLv) {
        setInventory(inv=>inv.map(i=>i.uid===uid?{...degraded,enhLv:newLv}:i));
        Object.entries(player.equipment).forEach(([slot,eq])=>{
          if((eq&&eq.uid)===uid) setPlayer(p=>({...p,equipment:{...p.equipment,[slot]:{...degraded,enhLv:newLv}}}));
        });
      }
      setEnhanceAnim("fail");
      setEnhanceLog(l=>[
        newLv < curLv
          ? L(`💔 強化失敗！+${curLv} → +${newLv}（降級）費用 ${cost} 金幣`,`💔 Failed! +${curLv} → +${newLv} (downgraded) Cost ${cost}g`)
          : L(`💔 強化失敗！+${curLv} 維持不變。費用 ${cost} 金幣`,`💔 Failed! +${curLv} unchanged. Cost ${cost}g`),
        ...l
      ]);
    }
    setTimeout(()=>setEnhanceAnim(null), 700);
  };

  const doTrain = (statId) => {
    const current = Math.max(0, parseInt(player[statId])||0);
    const cost = trainCost(player.level, current);
    if(isNaN(cost)||cost<=0) return;
    if(player.gold < cost) return;
    if(player.gold - cost < 50) { alert(L(`訓練費用 ${cost}，會讓金幣低於 50，請先賺更多金幣！`,`Training costs ${cost} gold — balance would drop below 50!`)); return; }
    const isMhp = (TRAIN_STATS.find(s=>s.id===statId)&&TRAIN_STATS.find(s=>s.id===statId).hpStat);
    setPlayer(p=>{
      const np={...p, gold:p.gold-cost, [statId]:(parseInt(p[statId])||0)+1, totalTrains:(p.totalTrains||0)+1};
      if(isMhp) np.hp=Math.min(np.hp+3, cMhp(np));
      updateQuestProgress(np, inventory);
      return np;
    });
  };

  // ── Arena handlers ──────────────────────────────────────────────────────
  // ── Tavern Inn: rest to full HP, clear all debuffs ───────────────────────
  const innRest = () => {
    const now = Date.now();
    const isDungeonInjured = now < dungeonInjuredUntil;
    const isArenaInjured   = now < arenaInjuredUntil;
    const isAtFullHp = player.hp >= cMhp(player);

    if(!isDungeonInjured && !isArenaInjured && isAtFullHp) {
      alert(L("你的狀態良好，不需要休息！","You are in good shape, no rest needed!"));
      return;
    }
    // Inn cost scales with level, min 50 gold
    const cost = Math.max(50, Math.floor(player.level * 15 + 30));
    if(player.gold < cost) {
      alert(L(`住宿費用 🪙${cost}，你的金幣不足！`,`Inn fee 🪙${cost} — not enough gold!`));
      return;
    }
    setPlayer(p=>({...p, gold:p.gold-cost, hp:cMhp(p)}));
    setDungeonInjuredUntil(0);
    setArenaInjuredUntil(0);
    setQuestNotify(L(`🛏 休息完畢！HP 回滿，所有禁戰狀態已解除。\n費用：🪙${cost}`,`🛏 Rested! HP fully restored, all cooldowns cleared.\nCost: 🪙${cost}`));
    setTimeout(()=>setQuestNotify(null), 3000);
  };

  const initArena = () => {
    const today = new Date().toISOString().slice(0,10);
    // Reset free refreshes on new day
    if(arenaLastDate !== today) {
      setArenaLastDate(today);
      setArenaRefreshes(5);
    }
    setArenaOpponents(Array.from({length:4}, ()=>genArenaOpponent(player.level,{atk:cAtk(player),def:cDef(player),mhp:cMhp(player)})));
  };

  // ── Quest handlers ────────────────────────────────────────────────────────
  // Reset daily/weekly quests if date has changed
  const checkQuestReset = (qs) => {
    const today = new Date().toISOString().slice(0,10);
    const week  = getWeekKey();
    let newQs   = {...qs, progress:{...qs.progress}};
    let changed = false;
    if(qs.dailyDate !== today) {
      // Reset daily quest bases to current player values
      Object.keys(QUEST_DEFS).forEach(id=>{
        if(QUEST_DEFS[id].cat==="daily") {
          newQs.progress[id] = { collected:false, baseVal: player[QUEST_DEFS[id].field]||0 };
        }
      });
      newQs.dailyDate = today;
      changed = true;
    }
    if(qs.weeklyDate !== week) {
      Object.keys(QUEST_DEFS).forEach(id=>{
        if(QUEST_DEFS[id].cat==="weekly") {
          newQs.progress[id] = { collected:false, baseVal: player[QUEST_DEFS[id].field]||0 };
        }
      });
      newQs.weeklyDate = week;
      changed = true;
    }
    return changed ? newQs : qs;
  };

  // Collect quest reward
  const collectQuest = (questId) => {
    const def = QUEST_DEFS[questId];
    if(!def) return;
    const statsWithInv = {...player, _inv: inventory};
    if(!isQuestDone(questId, statsWithInv, questState)) return;

    // Apply rewards
    let np = {...player};
    const drops = [];
    def.rewards.forEach(r => {
      if(r.type==="gold")   { np.gold += r.value; }
      if(r.type==="exp")    { const log=[]; np=lvUp(np, r.value, 0, log); }
      if(r.type==="item")   { const d=genLoot(np.level, r.rarity==="mythic"?0.6:r.rarity==="legendary"?0.4:r.rarity==="rare"?0.2:0.1); drops.push(d); }
      if(r.type==="scroll") { const s=genMercScroll(np.level, r.rarity); drops.push(s); }
    });
    setPlayer(np);
    if(drops.length>0) setInventory(inv=>[...inv,...drops]);

    // Mark as collected
    setQuestState(qs=>({
      ...qs,
      progress:{...qs.progress, [questId]:{...(qs.progress[questId]||{}), collected:true}}
    }));

    // Toast notification
    const rewardText = def.rewards.map(r=>r.label).join("、");
    setQuestNotify(`✅ 任務完成：${def.title}\n獎勵：${rewardText}`);
    setTimeout(()=>setQuestNotify(null), 3000);
  };

  // Update quest progress whenever player stats change — check for newly completable quests
  const updateQuestProgress = (updatedPlayer, updatedInventory) => {
    const statsWithInv = {...updatedPlayer, _inv: updatedInventory||inventory};
    const newQs = checkQuestReset(questState);
    // Check if any quests became completable — show notification
    Object.keys(QUEST_DEFS).forEach(id=>{
      if(!(newQs.progress[id]&&newQs.progress[id].collected)) {
        if(isQuestDone(id, statsWithInv, newQs)) {
          // Only notify once per quest
        }
      }
    });
    if(newQs !== questState) setQuestState(newQs);
  };

  // ── Tavern handlers ────────────────────────────────────────────────────────
  const initTavern = () => {
    const today = new Date().toISOString().slice(0,10);
    // Only regenerate on new day, NOT when board is empty (tasks completed)
    if(tavernLastRefresh !== today) {
      setTavernBoard(genTavernBoard(player.level));
      setTavernLastRefresh(today);
    }
    // First load ever
    if(!tavernLastRefresh) {
      setTavernBoard(genTavernBoard(player.level));
      setTavernLastRefresh(today);
    }
  };

  const refreshTavern = () => {
    const cost = 30 + player.level * 5;
    if(player.gold < cost) { alert(L(`刷新酒館告示板需要 ${cost} 金幣`,`Refreshing the board costs ${cost} gold`)); return; }
    setPlayer(p=>({...p, gold:p.gold-cost}));
    setTavernBoard(genTavernBoard(player.level));
  };

  const acceptTavernQuest = (questId) => {
    setTavernAccepted(a=>({...a, [questId]:{accepted:true, concluded:false}}));
  };

  const collectTavernQuest = (quest) => {
    const progress = (player.monsterKills||{})[quest.targetMonster]||0;
    const accepted = tavernAccepted[quest.id];
    const baseKills = (accepted&&accepted.baseKills)||0;
    if(progress - baseKills < quest.reqCount) return;
    // Give rewards
    setPlayer(p=>{
      const np={...p, gold:p.gold+quest.reward.gold};
      const log=[];
      return lvUp(np, quest.reward.exp, 0, log);
    });
    // Mark concluded
    setTavernAccepted(a=>({...a, [quest.id]:{...a[quest.id], concluded:true}}));
    // Remove from board
    setTavernBoard(b=>b.filter(q=>q.id!==quest.id));
    // Trigger parchment story popup
    setStoryPopup(quest);
  };

  const abandonTavernQuest = (questId) => {
    setTavernAccepted(a=>{const n={...a};delete n[questId];return n;});
  };

  const arenaRefresh = (free) => {
    if(free) {
      if(arenaRefreshes <= 0) return;
      setArenaRefreshes(r=>r-1);
    } else {
      const cost = 50 + player.level * 10;
      if(player.gold < cost) { alert(L(`刷新需要 ${cost} 金幣！`,`Refresh costs ${cost} gold!`)); return; }
      setPlayer(p=>({...p, gold:p.gold-cost}));
    }
    setArenaOpponents(Array.from({length:4}, ()=>genArenaOpponent(player.level,{atk:cAtk(player),def:cDef(player),mhp:cMhp(player)})));
  };

  const startArenaBattle = (opponent) => {
    const now = Date.now();
    if(now < arenaInjuredUntil) return;
    const result = simulateArenaBattle(player, opponent);
    const np = {...result.finalPlayer};
    if(result.won) {
      np.gold = np.gold + result.goldPlundered;
      np.totalArenaWins  = (np.totalArenaWins||0) + 1;
      np.totalGoldEarned = (np.totalGoldEarned||0) + result.goldPlundered;
      setArenaOpponents(ops=>ops.filter(o=>o.id!==opponent.id));
    } else {
      setArenaInjuredUntil(now + 30*60*1000);
      np.hp   = Math.floor(cMhp(np)*0.2);
      np.gold = Math.max(50, np.gold - Math.min(200, Math.floor(np.gold*0.08)));
    }
    np.highestLevel = Math.max(np.highestLevel||1, np.level);
    setPlayer(np);
    setReplay({lines:result.log, cursor:0, drops:[], won:result.won, isArena:true, opponent});

    updateQuestProgress(np, inventory);

  const refreshAuction = () => {
    setAuctionItems(Array.from({length:4},()=>genAuctionItem(player.level)));

  const placeBid=(auctionId,amount)=>{
    if(!amount||amount<=0)return;
    setAuctionItems(items=>items.map(it=>{
      if(it.auctionId!==auctionId)return it;
      const minBid=it.currentBid+Math.max(5,Math.floor(it.currentBid*0.1));
      if(amount<minBid){alert(L(`最低加價為 ${minBid} 金幣`,`Minimum raise is ${minBid} gold`));return it;}
      if(player.gold<amount){alert(L("金幣不足！","Not enough gold!"));return it;}
      setPlayer(p=>({...p,gold:p.gold-amount+(it.myBid||0)}));
      return {...it,currentBid:amount,myBid:amount,bidCount:it.bidCount+1};
    }));
  };
  const claimAuction=(auctionId)=>{
    const it=auctionItems.find(a=>a.auctionId===auctionId);
    if(!it||!it.myBid)return;
    const {cost:_c,auctionId:_a,currentBid:_b,myBid:_m,bidCount:_bc,endsIn:_e,sold:_s,...clean}=it;
    setInventory(inv=>[...inv,{...clean,uid:Date.now()+Math.random()}]);
    setAuctionItems(items=>items.filter(a=>a.auctionId!==auctionId));
    refreshAuction();

  };

    const item=player.equipment[slot]; if(!item)return;

    {id:"boots",label:t("slotBoots")},{id:"ring",label:t("slotRing")},{id:"amulet",label:t("slotAmulet")},

  const potions=inventory.filter(i=>i.type==="potion").length;
  const hpPct=Math.round((player.hp/tMhp)*100);

  return (

            <button onClick={()=>setLang(l=>l==="zh"?"en":"zh")} style={{
              padding:"3px 8px",borderRadius:3,
              background:"linear-gradient(135deg,#1a1408,#120e06)",
              border:"1px solid #6a4a14",color:"#c8a040",
              fontSize:10,fontFamily:"'Cinzel',serif",cursor:"pointer",
              letterSpacing:.5,
            }}>{t("langBtn")}</button>
            <button onClick={()=>setShowGuide(true)} style={{
              width:26,height:26,borderRadius:"50%",
              background:"linear-gradient(135deg,#2a1e08,#1a1208)",
              border:"1px solid #8b5a14",color:"#c8961e",
              fontFamily:"'Cinzel',serif",fontSize:13,fontWeight:"bold",
              cursor:"pointer",lineHeight:"24px",flexShrink:0,
              boxShadow:"0 2px 6px rgba(0,0,0,.4)",

          </div>
        </header>
        <div className="ml">
          {/* ── Sidebar ── */}
          <aside className="sb">
            <div className="pn">
              <div className="ph">{t("charTitle")}</div>
              <div className="pb">
                <div className="pname">{player.name}</div>
                <div className="bw">
                  <div className="bl"><span>{t("statHp")}</span><span>{player.hp}/{tMhp}</span></div>
                  <div className="bt"><div className="bf hf" style={{width:`${hpPct}%`}}/></div>
                </div>
                <div className="bw">
                  <div className="bl"><span>Lv.{player.level}</span><span>{player.exp}/{player.expNeeded}</span></div>
                  <div className="bt"><div className="bf ef" style={{width:`${expPct}%`}}/></div>
                </div>
                <div style={{marginTop:8}}>
                  {[
                    [t("statAtk"), tAtk, player.trainedAtk||0],
                    [t("statDef"), tDef, player.trainedDef||0],
                    [t("statSpd"), tSpd, player.trainedSpd||0],
                  ].map(([k,v,trained])=>(
                    <div className="sr" key={k}>
                      <span className="sl">{k}</span>
                      <span className="sv">
                        {v}
                        {trained>0&&<span style={{fontSize:10,color:"#4caf50",marginLeft:3}}>+{trained}{t("trained")}</span>}
                      </span>
                    </div>
                  ))}
                  <div className="sr">
                    <span className="sl">{t("statMaxHp")}</span>
                    <span className="sv">
                      {tMhp}
                      {(player.trainedHp||0)>0&&<span style={{fontSize:10,color:"#c84040",marginLeft:3}}>+{(player.trainedHp||0)*3}{t("trained")}</span>}
                    </span>
                  </div>
                </div>
                {wCat&&<div className="weapon-trait">{wCat.icon} {lang==="zh"?wCat.label:(wCat.labelEn||wCat.label)}：{lang==="zh"?wCat.traitDesc:(wCat.traitDescEn||wCat.traitDesc)}</div>}
              </div>
            </div>

            <div className="pn">
              <div className="ph">{t("equipPanel")}</div>
              <div className="pb" style={{padding:"8px 10px"}}>
                {EQUIP_SLOTS.map(s=>{
                  const eq=player.equipment[s.id];
                  const rar=eq?getRarity(eq.rarity):null;
                  const rc=rar?rar.color:"#2a1808";
                  const glow=(rar&&rar.glow)||"";
                  const cat=(eq&&eq.cat)?WEAPON_CATEGORIES[eq.cat]:null;
                  return(
                    <div key={s.id}
                      onClick={()=>unequip(s.id)}
                      title={eq?t("clickUnequip"):(t("slot"+s.id.charAt(0).toUpperCase()+s.id.slice(1))||s.label)+t("emptySlot")}
                      style={{

                        background: eq ? `${rc}0d` : "rgba(0,0,0,0.2)",

                      <span style={{fontSize:13,flexShrink:0,marginTop:1}}>{s.icon}</span>
                      <div style={{minWidth:0,flex:1}}>
                        <div style={{fontSize:9,color:"#4a3020",fontFamily:"'Cinzel',serif",letterSpacing:.5,lineHeight:1}}>{t("slot"+s.id.charAt(0).toUpperCase()+s.id.slice(1))||s.label}</div>
                        {eq ? <>
                          <div style={{
                            fontSize:11, color:rc, lineHeight:1.3, marginTop:1,
                            textShadow: glow ? `0 0 6px ${rc}88` : "none",
                            fontFamily:"'Cinzel',serif", letterSpacing:.3,

                          <div style={{fontSize:10,color:"#6a5030",marginTop:2,display:"flex",gap:6,flexWrap:"wrap"}}>
                            {eq.attack>0 && <span style={{color:"#c8781e"}}>{L("攻","A")}+{eq.attack}</span>}
                            {eq.defense>0 && <span style={{color:"#4a9fd4"}}>{L("防","D")}+{eq.defense}</span>}
                            {eq.hp>0 && <span style={{color:"#c84040"}}>HP+{eq.hp}</span>}
                            {eq.speed>0 && <span style={{color:"#4caf50"}}>{L("速","S")}+{eq.speed}</span>}

                                  {lang==="zh"?a.tag:(TAG_EN[a.tag]||a.tag)}
                                </span>
                              ))}
                            </div>
                          )}
                        </> : <div style={{fontSize:10,color:"#2a1808",fontStyle:"italic"}}>{t("emptySlot2")}</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="pn">
              <div className="ph">{L("存檔","Save")}</div>
              <div className="pb">
                <div className="svr">
                  <button className="btn btp" onClick={save}>{t("saveBtn")}</button>
                  <button className="btn btm" onClick={reset}>{t("resetBtn")}</button>
                </div>
                {saveMsg&&<div className="svi">{saveMsg}</div>}
              </div>
            </div>
          </aside>

          {/* ── Main ── */}
          <main>
            <div className="nt">
              {[["dungeon","tabDungeon"],["arena","tabArena"],["tavern","tabTavern"],["quest","tabQuest"],["shop","tabShop"],["inventory","tabInventory"],["train","tabForge"]].map(([id,tk])=>{
                const isQuest = id==="quest";
                const statsWithInv2 = {...player, _inv:inventory};
                const qDone = isQuest ? Object.keys(QUEST_DEFS).filter(qid=>isQuestDone(qid,statsWithInv2,questState)).length : 0;
                return(
                  <button key={id} className={`nb${tab===id?" active":""}`}
                    style={{position:"relative"}}
                    onClick={()=>{setTab(id);if(id==="arena"&&arenaOpponents.length===0)initArena();if(id==="tavern")initTavern();}}>
                    {t(tk)}
                    {isQuest&&qDone>0&&(
                      <span style={{position:"absolute",top:4,right:4,background:"#c84040",color:"#fff",
                        borderRadius:"8px",padding:"0 4px",fontSize:9,lineHeight:"14px",fontFamily:"sans-serif"}}>
                        {qDone}
                      </span>
                    )}
                  </button>
                );

              {replay&&<button className={`nb${tab==="battle"?" active":""}`} onClick={()=>setTab("battle")}>{replay.won?"🏆":"⚔"} {L("報告","Report")}</button>}

              {tab==="dungeon"&&(
                <div>

                    <div style={{
                      background:"linear-gradient(135deg,#2a0808,#1a0606)",

                        onClick={()=>setTab("tavern")}>

                      </button>

                  <div className="sub">{t("expTitle")}</div>

                  </div>

                    <div className="dz" key={d.id}>

                            borderRadius:6,padding:"14px 16px",opacity:locked?0.5:1,
                          }}>
                          <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                            <div style={{fontSize:28,flexShrink:0}}>{quest.icon}</div>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                                <div style={{fontFamily:"'Cinzel',serif",fontSize:13,color:isDone?"#4caf50":"#c8961e",letterSpacing:.5}}>
                                  {lang==="zh"?quest.title:(quest.titleEn||quest.title)}
                                </div>
                                <div style={{fontSize:10,color:"#5a4020",background:"rgba(0,0,0,0.3)",padding:"1px 6px",borderRadius:2}}>
                                  Lv.{quest.reqLv}+
                                </div>
                                {locked&&<div style={{fontSize:10,color:"#c84040"}}>{t("lvLocked")}</div>}
                              </div>
                              {/* Lore (委託背景) */}
                              <div style={{fontSize:11,color:"#6a5030",lineHeight:1.7,marginBottom:8,fontStyle:"italic"}}>
                                {lang==="zh"?quest.lore:(quest.loreEn||quest.lore)}
                              </div>
                              <div style={{display:"flex",gap:12,fontSize:11,color:"#8a6040",marginBottom:8,flexWrap:"wrap"}}>
                                <span>{monsterData?monsterData.icon:"👹"} {L("目標：","Target: ")}{monsterData?(lang==="zh"?monsterData.name:(monsterData.nameEn||monsterData.name)):quest.targetMonster} ×{quest.reqCount}</span>
                                <span style={{color:"#c8961e"}}>🪙{quest.reward.gold} ✨{quest.reward.exp}EXP</span>
                              </div>
                              <div style={{fontSize:10,color:"#4a3820",marginBottom:isAccepted?8:0,fontStyle:"italic"}}>

                              {isAccepted&&!isDone&&(
                                <div style={{marginTop:6}}>
                                  <div className="quest-scroll-bar" style={{marginBottom:3}}>
                                    <div className="quest-scroll-fill" style={{width:`${pct}%`}}/>
                                  </div>
                                  <div style={{fontSize:10,color:"#6a5030"}}>{progress} / {quest.reqCount} {L("已擊殺","killed")}</div>
                                </div>
                              )}
                              {isDone&&<div style={{fontSize:11,color:"#4caf50",marginTop:4}}>{t("tavernDoneMsg")}</div>}
                            </div>
                            <div style={{flexShrink:0,display:"flex",flexDirection:"column",gap:6}}>
                              {!isAccepted&&!locked&&(
                                <button className="btn btp" style={{fontSize:10,padding:"6px 12px",whiteSpace:"nowrap"}}
                                  onClick={()=>setTavernAccepted(a=>({...a,[quest.id]:{
                                    accepted:true,concluded:false,
                                    baseKills:(player.monsterKills||{})[quest.targetMonster]||0
                                  }}))}>
                                  {L("接受委託","Accept Quest")}
                                </button>
                              )}
                              {isDone&&(
                                <button className="btn btp" style={{fontSize:10,padding:"6px 12px",whiteSpace:"nowrap",
                                  background:"linear-gradient(135deg,#1a4a1a,#0e2e0e)"}}
                                  onClick={()=>collectTavernQuest(quest)}>
                                  {L("🎁 領取獎勵","🎁 Claim Reward")}
                                </button>
                              )}
                              {isAccepted&&!isDone&&(
                                <button className="btn btd" style={{fontSize:10,padding:"6px 12px",whiteSpace:"nowrap"}}
                                  onClick={()=>abandonTavernQuest(quest.id)}>
                                  {L("放棄","Abandon")}
                                </button>
                              )}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* ── QUEST TAB ── */}
              {tab==="quest"&&<QuestTab
                player={player}
                inventory={inventory}
                questState={checkQuestReset(questState)}
                onCollect={collectQuest}
                t={t}
                lang={lang}
              />}

              {/* ── BATTLE REPLAY ── */}
              {tab==="battle"&&(
                <div className="ba">
                  {replay ? (
                    <>
                      <div className="btl">
                        {replay.isArena
                          ? L(`🏟 競技場 · ${(replay.opponent&&replay.opponent.name)||"對手"}`,`🏟 Arena · ${(replay.opponent&&replay.opponent.name)||"Opponent"}`)
                          : replay.isExpedition
                          ? `🗺 ${(replay.expedition&&replay.expedition.name)}`
                          : replay.isMerc
                            ? `🏴 ${(MERC_DUNGEONS.find(d=>d.id===replay.mercDungeonId)&&MERC_DUNGEONS.find(d=>d.id===replay.mercDungeonId).label)||"傭兵副本"}`
                          : replay.dungeon?`${replay.dungeon.icon} ${lang==="zh"?replay.dungeon.name:(replay.dungeon.nameEn||replay.dungeon.name)}`:"⚔"}
                        {!replay.isExpedition&&!replay.isMerc&&!replay.isArena&&` · ${replay.tier?(lang==="zh"?replay.tier.label:(replay.tier.labelEn||replay.tier.label)):""}`}
                      </div>

                      <div style={{marginBottom:12}}>
                        <div style={{fontSize:10,color:"#5a4020",fontFamily:"'Cinzel',serif",letterSpacing:1,marginBottom:4,textAlign:"center"}}>
                          {replay.cursor<replay.lines.length?t("battleWait"):t("battleEnd")}
                        </div>
                        <div className="bt" style={{height:5}}>
                          <div className="bf" style={{
                            width:`${Math.round(replay.cursor/replay.lines.length*100)}%`,
                            background:replay.won?"linear-gradient(90deg,#1a5a1a,#40a040)":"linear-gradient(90deg,#5a1a1a,#a04040)"
                          }}/>
                        </div>
                      </div>

                      <ReplayLog lines={replay.lines} cursor={replay.cursor}/>

                      <div className="bact" style={{marginTop:12}}>
                        {replay.cursor<replay.lines.length?(
                          <button className="btn btm" onClick={()=>setReplay(r=>r?{...r,cursor:r.lines.length}:null)}>
                            {t("btnSkip")}
                          </button>
                        ):(
                          <>
                            <button className="btn btp" onClick={()=>replay.isArena?setTab("arena"):replay.isExpedition?startExpedition(replay.expedition):replay.isMerc?startMercBattle(replay.mercDungeonId):startBattle(replay.dungeon,replay.tier)}>
                              {replay.isArena?t("btnArenaBack"):t("btnRunAgain")}
                            </button>
                            <button className="btn btm" onClick={()=>{setReplay(null);setTab("dungeon");}}>
                              {t("btnReturn")}
                            </button>
                          </>
                        )}
                      </div>
                    </>
                  ):(
                    <div style={{textAlign:"center",color:"#5a4020",fontFamily:"'Cinzel',serif",fontSize:13,marginTop:40}}>
                      {t("btnChargeDun")}
                    </div>
                  )}
                </div>
              )}

              {/* ── SHOP ── */}
              {tab==="shop"&&(
                <div>
                  <div className="stl">
                    {L("商店","Shop")} <span style={{color:"#6a5030",fontSize:13}}>— 🪙 {player.gold}</span>
                  </div>

                  <div style={{display:"flex",gap:6,marginBottom:14,borderBottom:"1px solid #3a2a10",paddingBottom:8}}>
                    {[["buy",L("🏪 購買","🏪 Buy")],["auction",L("🔨 競標","🔨 Auction")],["sell",L("💰 賣出","💰 Sell")]].map(([id,lbl])=>(
                      <button key={id} className={`btn${shopTab===id?" btp":" btm"}`} style={{fontSize:11,padding:"7px 14px"}} onClick={()=>setShopTab(id)}>{lbl}</button>
                    ))}
                  </div>

                  {/* ── BUY TAB ── */}
                  {shopTab==="buy"&&(
                    <div>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                        <div style={{fontSize:12,color:"#6a5030"}}>{L("商品已依你的等級","Items generated for your level")}(Lv.{player.level})</div>
                        <button className="btn btm" style={{fontSize:10,padding:"5px 12px"}} onClick={refreshShop}>
                          {L("🔄 刷新","🔄 Refresh")} (-🪙{Math.floor(player.level*5+20)})
                        </button>
                      </div>
                      <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
                        {["all","weapon","offhand","armor","helmet","gloves","boots","ring","amulet"].map(f=>(

                            {f==="all"?L("全部","All"):(EQUIP_SLOTS.find(s=>s.id===f)?(lang==="zh"?EQUIP_SLOTS.find(s=>s.id===f).label:(EQUIP_SLOTS.find(s=>s.id===f).labelEn||EQUIP_SLOTS.find(s=>s.id===f).label)):f)}

                          {name:L("中型藥水","Medium Potion"),  icon:"⚗️", heal:100, pct:0,  cost:80},
                          {name:L("大型藥水","Large Potion"),   icon:"🫧", heal:300, pct:0,  cost:200},
                          {name:L("生命之露","Life Dew"),       icon:"💧", heal:0,   pct:50, cost:350},
                          {name:L("不死聖水","Undying Water"),  icon:"✨", heal:0,   pct:99, cost:1200},
                        ].map((p,i)=>(
                          <div key={i} style={{
                            display:"flex",flexDirection:"column",alignItems:"center",gap:4,
                            padding:"10px 8px",background:"linear-gradient(160deg,#0a180a,#081208)",

                            <div style={{fontSize:22}}>{p.icon}</div>
                            <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:"#50c890",lineHeight:1.3}}>{p.name}</div>
                            <div style={{fontSize:10,color:"#3a6a3a"}}>
                              {p.pct>0?`+${p.pct}% HP`:`+${p.heal} HP`}
                            </div>
                            <div style={{color:"#f0c040",fontSize:11}}>🪙{p.cost}</div>
                            <button className="btn btp" style={{width:"100%",fontSize:10,padding:"4px"}}

                              onClick={()=>buyItem({...p,type:"potion",slot:"potion",rarity:"normal",uid:Date.now()+Math.random(),specials:[],affixes:[]})}>
                              {L("買","Buy")}
                            </button>
                          </div>
                        ))}
                      </div>
                      <div className="sg">

                            <div key={idx} className="si" style={{borderColor:rar.color+"55",background:`linear-gradient(160deg,${rar.color}08,#141008)`,boxShadow:rar.glow||"none"}}>

                              <div className="rb" style={{color:rar.color,borderColor:rar.color+"55",background:`${rar.color}15`}}>{lang==="zh"?rar.label:(rar.labelEn||rar.label)}</div>
                              <div className="sin" style={{color:rar.color}}>{lang==="zh"?item.name:(item.nameEn||item.name)}</div>
                              {cat&&<div className="sit">{cat.icon} {lang==="zh"?cat.label:(cat.labelEn||cat.label)} · {lang==="zh"?cat.traitDesc:(cat.traitDescEn||cat.traitDesc)}</div>}

                                {item.attack>0&&<div style={{color:"#c8781e"}}>{L("攻","A")}+{item.attack}</div>}

                                {item.speed>0&&<div style={{color:"#4caf50"}}>{L("速","S")}+{item.speed}</div>}
                                {item.itemLevel>0&&<div style={{color:"#5a4020",fontSize:10}}>Lv{item.itemLevel}</div>}
                              </div>
                              {item.affixes && item.affixes.length > 0 && <div className="iaf" style={{marginBottom:6}}>
                                {item.affixes.map((a,i)=>{
                                  const tg=lang==="zh"?a.tag:(TAG_EN[a.tag]||a.tag);
                                  return <div key={i} className={`al${a.special?" as":""}`}>
                                    {a.stat?`${tg}:+${a.rolledVal}`:a.special==="crit"?`${tg}:${a.rolledVal}%${L("爆擊","Crit")}`:a.special==="lifesteal"?`${tg}:${a.rolledVal}%${L("吸血","Lifesteal")}`:tg}
                                  </div>;
                                })}
                              </div>}
                              <div className="sic">🪙 {item.cost}</div>
                              <button className="btn btp" style={{width:"100%",fontSize:10}} onClick={()=>buyItem(item)} disabled={player.gold<item.cost}>{L("購買","Buy")}</button>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {shopTab==="auction"&&(
                    <div>

                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:12}}>
                        {auctionItems.filter(a=>!a.sold).map(it=>{
                          const rar=getRarity(it.rarity);
                          const cat=it.cat?WEAPON_CATEGORIES[it.cat]:null;
                          const myBid=bidInput[it.auctionId]||"";
                          const minNext=it.currentBid+Math.max(5,Math.floor(it.currentBid*0.1));
                          const iWon=it.myBid>0&&it.myBid===it.currentBid;
                          return(
                            <div key={it.auctionId} style={{
                              background:`linear-gradient(160deg,${rar.color}08,#141008)`,
                              border:`1px solid ${rar.color}66`,
                              borderRadius:6, padding:"14px",
                              boxShadow:rar.glow||"none",
                            }}>
                              <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                                <div style={{fontSize:30,filter:`drop-shadow(0 2px 8px ${rar.color}88)`}}>{it.icon}</div>
                                <div style={{flex:1}}>
                                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                                    <div className="rb" style={{color:rar.color,borderColor:rar.color+"55",background:`${rar.color}15`}}>{lang==="zh"?rar.label:(rar.labelEn||rar.label)}</div>

                                    {it.defense>0&&<span style={{color:"#4a9fd4"}}>{L("防","DEF")}+{it.defense}</span>}
                                    {it.hp>0&&<span style={{color:"#c84040"}}>HP+{it.hp}</span>}
                                    {it.speed>0&&<span style={{color:"#4caf50"}}>{L("速","SPD")}+{it.speed}</span>}
                                    {it.itemLevel>0&&<span style={{color:"#5a4020"}}>Lv{it.itemLevel}</span>}
                                  </div>

                                    </div>
                                    {iWon&&<div style={{fontSize:11,color:"#4caf50"}}>{t("topBidder")}</div>}
                                  </div>
                                </div>
                              </div>
                              <div style={{display:"flex",gap:8,marginTop:10,alignItems:"center",flexWrap:"wrap"}}>
                                <div style={{fontSize:11,color:"#5a4020"}}>{L("最低加價","Min raise")} 🪙{minNext}</div>
                                <input
                                  type="number" min={minNext} placeholder={minNext}
                                  value={myBid}
                                  onChange={e=>setBidInput(b=>({...b,[it.auctionId]:parseInt(e.target.value)||""}))}
                                  style={{width:90,background:"#0e0a05",border:"1px solid #4a3010",borderRadius:3,color:"#f0c040",padding:"5px 8px",fontSize:12,fontFamily:"'Cinzel',serif"}}
                                />
                                <button className="btn btp" style={{fontSize:10,padding:"6px 12px"}} onClick={()=>{placeBid(it.auctionId,myBid);setBidInput(b=>({...b,[it.auctionId]:""}));}} disabled={!myBid||myBid<minNext||player.gold<myBid}>出價</button>
                                {iWon&&<button className="btn btm" style={{fontSize:10,padding:"6px 12px"}} onClick={()=>claimAuction(it.auctionId)}>{t("btnClaim")}</button>}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {/* ── SELL TAB ── */}
                  {shopTab==="sell"&&(
                    <div>
                      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
                        <div style={{fontSize:12,color:"#6a5030",flex:1}}>{t("sellDesc")}</div>
                        <button className="btn btm" style={{fontSize:10,padding:"6px 12px"}} onClick={sortInventory}>{t("sortBag")}</button>
                        {/* Threshold selector + sell button */}
                        <div style={{display:"flex",flexDirection:"column",gap:4}}>
                          <div style={{display:"flex",alignItems:"center",gap:4}}>
                            <span style={{fontSize:10,color:"#6a5030"}}>{L("賣出","Sell")}</span>
                            <select value={sellThreshold} onChange={e=>setSellThreshold(e.target.value)}
                              style={{background:"#1a1208",
                                border:`1px solid ${sellThreshold==="mythic"?"#c84040":sellThreshold==="legendary"?"#9c50d4":"#4a3010"}`,
                                color:sellThreshold==="mythic"?"#c84040":sellThreshold==="legendary"?"#9c50d4":sellThreshold==="rare"?"#4a9fd4":sellThreshold==="magic"?"#4caf50":"#c8961e",
                                borderRadius:3,padding:"4px 6px",fontSize:11,fontFamily:"'Cinzel',serif",cursor:"pointer"}}>
                              <option value="normal">⬜ {L("普通以下","Common & below")}</option>
                              <option value="magic">🟢 {L("魔法以下","Magic & below")}</option>
                              <option value="rare">🔵 {L("稀有以下","Rare & below")}</option>
                              <option value="legendary">🟣 {L("傳說以下","Legendary & below")}</option>
                              <option value="mythic">🟠 {L("神話以下（全賣）","Mythic & below (sell all)")}</option>
                            </select>
                            <button className="btn btd" style={{fontSize:10,padding:"6px 12px",
                              background:sellThreshold==="mythic"?"linear-gradient(135deg,#6a1010,#4a0808)":""}}
                              onClick={()=>{
                                if((sellThreshold==="mythic"||sellThreshold==="legendary")&&
                                  !window.confirm(L(`確定賣出所有【${sellThreshold==="mythic"?"神話":"傳說"}】以下裝備？此操作無法復原！`,`Sell all ${sellThreshold==="mythic"?"Mythic":"Legendary"} and below? Cannot be undone!`))) return;
                                sellJunk(sellThreshold);
                              }}>
                              🗑 一鍵賣出
                            </button>
                          </div>
                          {(sellThreshold==="mythic"||sellThreshold==="legendary")&&(
                            <div style={{fontSize:10,color:sellThreshold==="mythic"?"#c84040":"#9c50d4"}}>
                              ⚠️ 已裝備的裝備不受影響，但背包中的高品質裝備將被賣出
                            </div>
                          )}
                        </div>
                      </div>
                      {inventory.filter(i=>i.type!=="potion").length===0&&<div style={{color:"#4a3a20",fontStyle:"italic"}}>{t("noSellable")}</div>}
                      <div className="ig">
                        {inventory.filter(i=>i.type!=="potion").map(item=>{
                          const rar=getRarity(item.rarity);
                          const price=calcSellPrice(item);
